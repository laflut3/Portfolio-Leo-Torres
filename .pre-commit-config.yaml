repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        exclude: ^tsconfig.*\.json$
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint -- --max-warnings=0
        language: system
        pass_filenames: false
        files: \.(js|jsx|ts|tsx)$

      - id: prettier
        name: prettier
        entry: npm run format:check
        language: system
        pass_filenames: false
        files: \.(js|jsx|ts|tsx|css|json|md|yml|yaml|html)$

      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: (^|/)(Dockerfile|Dockerfile\..*|.*\.Dockerfile)$
